<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anubis AI Engine v8.5 | Luxury Commander</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<style>
/* ========= LUXURY ROOT TOKENS ========= */
:root{
  --bg-p:#0b0b0b;--bg-s:#101010;--bg-t:#171717;--bg-h:#1f1f1f;--bg-a:#272727;
  --t1:#ede9e0;--t2:#807a6f;--t3:#4d4840;
  --ac:#c8a97e;--ac-h:#dabb92;--ac-d:rgba(200,169,126,.12);
  --bd:rgba(55,65,81,1);--bd-h:#303030;--cd:#0f0f0f;
  --ez:cubic-bezier(.25,.1,.25,1);--dr:.3s;
  --sb-w:260px;--sb-c:68px;--tb-h:56px;
}
body.lt{
  --bg-p:#f5f5f0;--bg-s:#eee;--bg-t:#e6e4de;--bg-h:#dbd9d2;--bg-a:#d2d0c9;
  --t1:#1a1814;--t2:#5a5650;--t3:#8c8880;--bd:#d4d2cb;--cd:#f0efe9;
  --ac-d:rgba(200,169,126,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-p);color:var(--t1);font-family:'DM Sans',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;transition:background .4s,color .4s}

/* ========= FLOATING GOLD BUBBLES ========= */
.bubs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bu{position:absolute;border-radius:50%;filter:blur(90px);animation:bm 20s infinite alternate}
.bu:nth-child(1){width:50vw;height:50vw;background:radial-gradient(circle,rgba(200,169,126,.11),transparent 70%);left:-10vw;top:-10vw}
.bu:nth-child(2){width:40vw;height:40vw;background:radial-gradient(circle,rgba(200,169,126,.07),transparent 70%);right:0;top:5vh;animation-duration:28s}
.bu:nth-child(3){width:55vw;height:55vw;background:radial-gradient(circle,rgba(200,169,126,.08),transparent 70%);left:15vw;bottom:-15vh;animation-duration:22s}
@keyframes bm{from{transform:translate(0,0) scale(1)}to{transform:translate(6vw,6vh) scale(1.12)}}
body.lt .bu{filter:blur(120px);opacity:.4}

/* ========= YAYA12085 LOGIN — ADAPTED TO GOLD THEME ========= */
#lo{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg-p)}
.form-container{width:340px;border-radius:1rem;background-color:rgba(17,24,39,.95);padding:2.5rem;color:var(--t1);border:1px solid rgba(200,169,126,.12);box-shadow:0 30px 100px rgba(0,0,0,.6);backdrop-filter:blur(30px);position:relative;overflow:hidden}
.form-container::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--ac),transparent)}
.form-container .title{text-align:center;font-size:1.65rem;line-height:2rem;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--ac);letter-spacing:1px;text-shadow:0 0 20px rgba(200,169,126,.2);margin-bottom:8px}
.form-container .subtitle{text-align:center;font-size:.75rem;color:var(--t3);margin-bottom:1.5rem;letter-spacing:1px;text-transform:uppercase}
.login-tabs{display:flex;margin-bottom:1.5rem;background:rgba(255,255,255,.03);border-radius:10px;padding:3px;gap:3px;border:1px solid var(--bd)}
.login-tab{flex:1;padding:9px;font-size:11px;color:var(--t3);cursor:pointer;border-radius:8px;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:.25s}
.login-tab:hover{color:var(--t2);background:rgba(255,255,255,.04)}
.login-tab.act{color:var(--ac);background:rgba(200,169,126,.1);border:1px solid rgba(200,169,126,.2)}
.input-group{margin-top:.5rem;font-size:.875rem}
.input-group label{display:block;color:var(--t3);margin-bottom:4px;font-size:12px;font-weight:600;letter-spacing:.5px}
.input-group input{width:100%;border-radius:.5rem;border:1px solid var(--bd);outline:0;background-color:rgba(11,11,11,.6);padding:.75rem 1rem;color:var(--t1);font-family:inherit;font-size:14px;transition:.25s}
.input-group input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-d)}
.input-group input::placeholder{color:var(--t3)}
.sign{display:block;width:100%;background-color:var(--ac);padding:.85rem;text-align:center;color:rgba(17,24,39,1);border:none;border-radius:.5rem;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;margin-top:1.2rem;transition:.3s var(--ez);box-shadow:0 8px 24px rgba(200,169,126,.2)}
.sign:hover{background:var(--ac-h);transform:translateY(-2px);box-shadow:0 12px 32px rgba(200,169,126,.35)}
.sign:disabled{opacity:.5;cursor:not-allowed;transform:none}
.social-message{display:flex;align-items:center;padding-top:1.2rem}
.social-message .line{height:1px;flex:1;background-color:var(--bd)}
.social-message .message{padding:0 .75rem;font-size:.8rem;color:var(--t3);white-space:nowrap}
.social-icons{display:flex;justify-content:center;padding-top:.75rem;gap:12px}
.social-icons .icon{border-radius:.75rem;padding:.75rem;border:1px solid var(--bd);background-color:transparent;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center}
.social-icons .icon:hover{border-color:var(--ac);background:rgba(200,169,126,.08);transform:translateY(-3px)}
.social-icons .icon svg{height:1.25rem;width:1.25rem;fill:var(--t2);transition:.2s}
.social-icons .icon:hover svg{fill:var(--ac)}
.signup{text-align:center;font-size:.75rem;color:var(--t3);margin-top:1rem}
.signup a{color:var(--ac);text-decoration:none;font-weight:600}
.signup a:hover{text-decoration:underline}
.err-msg{display:none;color:#dc4444;text-align:center;font-size:12px;margin-top:10px}
/* OTP phone overrides */
.iti{width:100%;margin-bottom:0}
.iti__flag-container{z-index:10}
.iti__country-list{background:rgba(17,24,39,.95);border:1px solid var(--bd);color:var(--t1);border-radius:10px}
.iti__country:hover,.iti__country.iti__highlight{background:var(--bg-h)}
.iti__selected-dial-code{color:var(--t2)}

/* ========= LAYOUT ========= */
#ma{display:none;height:100vh;position:relative;z-index:10}
#ma.on{display:flex}
#sb{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);background:rgba(16,16,16,.88);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:.3s var(--ez);z-index:200;backdrop-filter:blur(30px)}
body.lt #sb{background:rgba(238,237,232,.92)}
#sb.col{width:var(--sb-c)}
#sb.col .sb-text{display:none}
.sb-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--bd)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-logo b{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--ac)}
.sb-btn{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--t2);border:none;background:0;cursor:pointer;transition:.2s;flex-shrink:0}
.sb-btn:hover{background:var(--bg-h);color:var(--t1)}
.sb-nav{flex:1;overflow-y:auto;padding:10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:.2s;font-size:13px;color:var(--t2)}
.sb-item:hover{background:var(--bg-h);color:var(--t1)}
.sb-item i{width:18px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px;border-top:1px solid var(--bd)}
.theme-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;cursor:pointer}
.theme-row:hover{background:var(--bg-h)}
.theme-row i{width:18px;text-align:center;color:var(--ac);font-size:14px}
.theme-row span{flex:1;font-size:13px;color:var(--t2)}
.tsw{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.tsw input{opacity:0;width:0;height:0;position:absolute}
.tsw-tr{position:absolute;inset:0;border-radius:22px;background:var(--bg-a);border:1px solid var(--bd);transition:.3s}
.tsw input:checked + .tsw-tr{background:var(--ac);border-color:var(--ac)}
.tsw-kn{position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tsw input:checked + .tsw-tr + .tsw-kn{left:20px}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-top:6px}
.sb-av{width:34px;height:34px;border-radius:10px;background:var(--ac);color:#010101;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:700}

/* MAIN */
#mn{flex:1;margin-left:var(--sb-w);display:flex;flex-direction:column;transition:margin-left .3s var(--ez);min-width:0}
#sb.col + #mn{margin-left:var(--sb-c)}
.tb{display:flex;align-items:center;justify-content:space-between;height:var(--tb-h);padding:0 24px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(11,11,11,.5);backdrop-filter:blur(20px);z-index:100}
body.lt .tb{background:rgba(238,237,232,.6)}
.ca{flex:1;overflow-y:auto;scroll-behavior:smooth}
.msc{padding:30px 50px 150px}
.modes{background:rgba(0,0,0,.3);padding:4px;border-radius:14px;display:flex;gap:3px;border:1px solid var(--bd)}
body.lt .modes{background:rgba(255,255,255,.5)}
.mp{padding:8px 16px;border:none;border-radius:10px;font-size:11px;font-weight:800;color:var(--t3);background:0;cursor:pointer;transition:.25s;display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.8px}
.mp:hover{color:var(--t1);background:rgba(255,255,255,.05)}
.mp.act{background:var(--ac);color:#010101;box-shadow:0 4px 16px rgba(200,169,126,.35)}

/* ========= CHAT MESSAGES ========= */
.msg{margin-bottom:36px;display:flex;gap:18px;max-width:100%;animation:mi .5s var(--ez)}
@keyframes mi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mav{width:36px;height:36px;border-radius:12px;background:var(--ac-d);border:1px solid rgba(200,169,126,.25);color:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;font-size:13px}
.msg.usr{justify-content:flex-end}
.msg.usr .mav{order:2;background:var(--ac);color:#010101;border:none}
.mbb{min-width:60px;line-height:1.8;font-size:14.5px;word-break:break-word}
.msg.usr .mbb{background:var(--bg-h);border-radius:22px 22px 4px 22px;padding:14px 22px;border:1px solid var(--bd);order:1}
.msg.ai .mbb{padding:8px 0;flex:1}
.msg.ai .mbb strong{color:var(--ac)}
.msg.ai .mbb pre{background:var(--cd);border:1px solid var(--bd);border-radius:10px;margin:10px 0;overflow-x:auto}
.msg.ai .mbb pre code{display:block;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;background:0!important}
.msg.ai .mbb table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.msg.ai .mbb th,.msg.ai .mbb td{padding:8px 12px;border:1px solid var(--bd);text-align:left}
.msg.ai .mbb th{background:var(--bg-a);font-weight:600}
.db-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--ac-d);padding:6px 14px;border-radius:9px;border:1px solid rgba(200,169,126,.12);width:fit-content;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ac);font-weight:900}
.db-header i{font-size:12px}

/* ========= SVG LOADER (mobinkakei adapted) ========= */
.loader-wrap{display:none;padding:30px;text-align:center}
.loader-wrap.on{display:flex;align-items:center;gap:20px;animation:mi .3s var(--ez)}
.loader-wrap .loader{--path:var(--t3);--dot:var(--ac);--duration:3s;width:44px;height:44px;position:relative;display:inline-block;flex-shrink:0}
.loader-wrap .loader:before{content:"";width:6px;height:6px;border-radius:50%;position:absolute;display:block;background:var(--dot);top:37px;left:19px;transform:translate(-18px,-18px);animation:dotRect var(--duration) cubic-bezier(.785,.135,.15,.86) infinite}
.loader-wrap .loader svg{display:block;width:100%;height:100%}
.loader-wrap .loader svg rect{fill:none;stroke:var(--path);stroke-width:10px;stroke-linejoin:round;stroke-linecap:round;stroke-dasharray:192 64 192 64;stroke-dashoffset:0;animation:pathRect 3s cubic-bezier(.785,.135,.15,.86) infinite}
@keyframes pathRect{25%{stroke-dashoffset:64}50%{stroke-dashoffset:128}75%{stroke-dashoffset:192}100%{stroke-dashoffset:256}}
@keyframes dotRect{25%{transform:translate(0,0)}50%{transform:translate(18px,-18px)}75%{transform:translate(0,-36px)}100%{transform:translate(-18px,-18px)}}
.loader-text{font-size:13px;color:var(--t3);font-weight:600}

/* ========= INPUT PILL ========= */
.ia{position:fixed;bottom:0;left:var(--sb-w);right:0;padding:30px 50px;transition:left .3s var(--ez);background:linear-gradient(transparent,var(--bg-p) 50%);z-index:150}
#sb.col + #mn .ia{left:var(--sb-c)}
.iw{display:flex;align-items:center;gap:16px;background:rgba(23,23,23,.9);border:1px solid var(--bd);border-radius:28px;padding:12px 22px;box-shadow:0 20px 50px rgba(0,0,0,.5);backdrop-filter:blur(30px)}
body.lt .iw{background:rgba(238,237,232,.9)}
#mi{flex:1;border:none;background:0;color:var(--t1);font-size:15px;outline:none;resize:none;max-height:200px;padding:5px 0;font-family:inherit}
#mi::placeholder{color:var(--t3)}
.snd{width:42px;height:42px;border-radius:14px;background:var(--ac);color:#010101;border:none;cursor:pointer;transition:.3s var(--ez);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 14px rgba(200,169,126,.2)}
.snd:hover{transform:scale(1.08) rotate(-5deg);box-shadow:0 0 24px rgba(200,169,126,.4)}
.snd:disabled{opacity:.12;cursor:not-allowed;transform:none}

#tst{position:fixed;top:32px;left:50%;transform:translateX(-50%);background:rgba(17,24,39,.95);color:var(--ac);padding:11px 28px;border-radius:18px;border:1px solid var(--bd);opacity:0;transition:.3s var(--ez);z-index:10000;pointer-events:none;font-weight:700;font-size:13px;backdrop-filter:blur(15px);white-space:nowrap}

@media(max-width:768px){
  #sb{transform:translateX(-100%);width:var(--sb-w)!important}
  #mn,.ia{margin-left:0!important;left:0!important}
  .msc,.ia{padding:20px}
  .form-container{width:90vw;padding:1.5rem}
}
</style>
</head>
<body>
<div class="bubs"><div class="bu"></div><div class="bu"></div><div class="bu"></div></div>

<!-- ============ LOGIN (Yaya12085 Adapted) ============ -->
<div id="lo">
  <div class="form-container">
    <p class="title">Anubis Intelligence</p>
    <p class="subtitle">Enterprise Commander v8.5</p>

    <div class="login-tabs">
      <div class="login-tab act" id="tabAdm">Admin</div>
      <div class="login-tab" id="tabWa">WhatsApp</div>
      <div class="login-tab" id="tabSoc">Social</div>
    </div>

    <!-- Admin Form -->
    <form class="form" id="lf">
      <div class="input-group"><label>Username</label><input type="text" id="lU" placeholder=""></div>
      <div class="input-group"><label>Password</label><input type="password" id="lP" placeholder="">
        <div style="display:flex;justify-content:flex-end;font-size:12px;color:var(--t3);margin:6px 0 12px"><a href="#" style="color:var(--ac);text-decoration:none">Forgot Password?</a></div>
      </div>
      <button type="submit" class="sign">Sign in</button>
    </form>

    <!-- WhatsApp OTP -->
    <div id="wLf" style="display:none">
      <div class="input-group"><label>Mobile Number</label><input type="tel" id="wU" placeholder=""></div>
      <div id="otpBox" style="display:none;margin-top:12px"><div class="input-group"><label>OTP Code</label><input type="text" id="wO" placeholder="6-digit code"></div></div>
      <button id="wBtn" class="sign" style="margin-top:16px">Send OTP</button>
    </div>

    <!-- Social -->
    <div id="sLf" style="display:none">
      <div class="social-message">
        <div class="line"></div>
        <p class="message">Login with social accounts</p>
        <div class="line"></div>
      </div>
      <div class="social-icons">
        <button class="icon" id="gBtn" title="Google"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path d="M16.318 13.714v5.484h9.078c-.37 2.354-2.745 6.901-9.078 6.901-5.458 0-9.917-4.521-9.917-10.099s4.458-10.099 9.917-10.099c3.109 0 5.193 1.318 6.38 2.464l4.339-4.182c-2.786-2.599-6.396-4.182-10.719-4.182-8.844 0-16 7.151-16 16s7.156 16 16 16c9.234 0 15.365-6.49 15.365-15.635 0-1.052-.115-1.854-.255-2.651z"/></svg></button>
        <button class="icon" id="tBtn" title="Twitter"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path d="M31.937 6.093c-1.177.516-2.437.871-3.765 1.032 1.355-.813 2.391-2.099 2.885-3.631-1.271.74-2.677 1.276-4.172 1.579-1.192-1.276-2.896-2.079-4.787-2.079-3.625 0-6.563 2.937-6.563 6.557 0 .521.063 1.021.172 1.495-5.453-.255-10.287-2.875-13.52-6.833-.568.964-.891 2.084-.891 3.303 0 2.281 1.161 4.281 2.916 5.457-1.073-.031-2.083-.328-2.968-.817v.079c0 3.181 2.26 5.833 5.26 6.437-.547.145-1.131.229-1.724.229-.421 0-.823-.041-1.224-.115.844 2.604 3.26 4.5 6.14 4.557-2.239 1.755-5.077 2.801-8.135 2.801-.521 0-1.041-.025-1.563-.088 2.917 1.86 6.36 2.948 10.079 2.948 12.067 0 18.661-9.995 18.661-18.651 0-.276 0-.557-.021-.839 1.287-.917 2.401-2.079 3.281-3.396z"/></svg></button>
        <button class="icon" id="hBtn" title="GitHub"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path d="M16 .396c-8.839 0-16 7.167-16 16 0 7.073 4.584 13.068 10.937 15.183.803.151 1.093-.344 1.093-.772 0-.38-.009-1.385-.015-2.719-4.453.964-5.391-2.151-5.391-2.151-.729-1.844-1.781-2.339-1.781-2.339-1.448-.989.115-.968.115-.968 1.604.109 2.448 1.645 2.448 1.645 1.427 2.448 3.744 1.74 4.661 1.328.14-1.031.557-1.74 1.011-2.135-3.552-.401-7.287-1.776-7.287-7.907 0-1.751.62-3.177 1.645-4.297-.177-.401-.719-2.031.141-4.235 0 0 1.339-.427 4.4 1.641 1.281-.355 2.641-.532 4-.541 1.36.009 2.719.187 4 .541 3.043-2.068 4.381-1.641 4.381-1.641.859 2.204.317 3.833.161 4.235 1.015 1.12 1.635 2.547 1.635 4.297 0 6.145-3.74 7.5-7.296 7.891.556.479 1.077 1.464 1.077 2.959 0 2.14-.02 3.864-.02 4.385 0 .416.28.916 1.104.755 6.4-2.093 10.979-8.093 10.979-15.156 0-8.833-7.161-16-16-16z"/></svg></button>
      </div>
      <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
    </div>

    <div id="lErr" class="err-msg">Invalid credentials</div>
  </div>
</div>

<!-- ============ MAIN APP ============ -->
<div id="ma">
  <aside id="sb">
    <div class="sb-hdr">
      <div class="sb-logo"><b>A</b><span class="sb-text" style="font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase">Anubis</span></div>
      <button class="sb-btn" id="stgBtn"><i class="fas fa-bars"></i></button>
    </div>
    <div class="sb-nav" id="sn">
      <div class="sb-item" id="newChatBtn"><i class="fas fa-plus"></i><span class="sb-text">New Chat</span></div>
    </div>
    <div class="sb-foot">
      <div class="theme-row" id="themeRow">
        <i class="fas fa-moon" id="themeIcon"></i>
        <span class="sb-text">Theme</span>
        <label class="tsw sb-text"><input type="checkbox" id="themeToggle"><div class="tsw-tr"></div><div class="tsw-kn"></div></label>
      </div>
      <div class="sb-user"><div class="sb-av" id="uaD">K</div><div class="sb-uname sb-text" id="unD">User</div></div>
    </div>
  </aside>

  <main id="mn">
    <header class="tb">
      <div class="modes">
        <button class="mp act" data-mode="ai"><i class="fas fa-brain"></i>AI</button>
        <button class="mp" data-mode="project"><i class="fas fa-city"></i>Project</button>
        <button class="mp" data-mode="material"><i class="fas fa-gem"></i>Material</button>
      </div>
      <div style="display:flex;gap:10px">
        <button class="mp" id="ncb" style="padding:8px 12px"><i class="fas fa-plus"></i></button>
      </div>
    </header>
    <div class="ca" id="ca">
      <div class="msc" id="msc"></div>
      <div class="loader-wrap" id="lw">
        <div class="loader"><svg viewBox="0 0 80 80"><rect x="8" y="8" width="64" height="64" rx="0" ry="0"/></svg></div>
        <span class="loader-text">Anubis is thinking...</span>
      </div>
    </div>
    <div class="ia">
      <div class="iw">
        <textarea id="mi" placeholder="Message Anubis..." rows="1"></textarea>
        <button class="snd" id="sdB"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </main>
</div>
<div id="tst"></div>

<script>
/* ========= ANUBIS ENGINE v8.5 — REAL BACKEND CONNECTED ========= */
const WORKER = 'https://anubis-agent-v2.romysingh84821.workers.dev';
let activeMode = 'ai', isDark = true, iti = null, typing = false;
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
function escH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=$('tst');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',3200)}

/* -- THEME -- */
function setTheme(dark){
  isDark=dark;document.body.classList.toggle('lt',!dark);
  $('themeIcon').className=dark?'fas fa-moon':'fas fa-sun';
  try{localStorage.setItem('anubis-t',dark?'d':'l')}catch(e){}
}

/* -- LOGIN -- */
function enterApp(u){
  $('lo').style.display='none';$('ma').classList.add('on');
  $('unD').textContent=u;$('uaD').textContent=u.charAt(0).toUpperCase();
  toast('Welcome, '+u);
}

/* -- REAL API CALL -- */
async function apiChat(message){
  try{
    const res = await fetch(WORKER+'/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message,userId:1,model:'openai/gpt-4o-mini',mode:activeMode})
    });
    if(!res.ok) throw new Error(res.statusText);
    return await res.json();
  }catch(e){
    return {text:'⚠️ Connection Error: '+e.message, sourcedFromDB:false, metrics:{model:'offline',tokens:0,cost:0,tps:0}};
  }
}

/* -- INIT -- */
function init(){
  /* Theme */
  const tc=$('themeToggle');
  tc.onchange=()=>setTheme(!tc.checked);
  if(localStorage.getItem('anubis-t')==='l'){setTheme(false);tc.checked=true}

  /* Phone input */
  if(window.intlTelInput&&$('wU')){
    iti=window.intlTelInput($('wU'),{initialCountry:'in',separateDialCode:true,utilsScript:'https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js'});
  }

  /* Tabs */
  function switchTab(t){
    $$('.login-tab').forEach(x=>x.classList.remove('act'));
    ({admin:$('tabAdm'),wa:$('tabWa'),soc:$('tabSoc')})[t].classList.add('act');
    $('lf').style.display=t==='admin'?'block':'none';
    $('wLf').style.display=t==='wa'?'block':'none';
    $('sLf').style.display=t==='soc'?'block':'none';
  }
  $('tabAdm').onclick=()=>switchTab('admin');
  $('tabWa').onclick=()=>switchTab('wa');
  $('tabSoc').onclick=()=>switchTab('soc');

  /* Admin */
  $('lf').onsubmit=(e)=>{e.preventDefault();const u=$('lU').value.trim();if(u)enterApp(u);else toast('Enter username')};

  /* WhatsApp */
  $('wBtn').onclick=()=>{
    const b=$('wBtn'),num=iti?iti.getNumber():$('wU').value.trim();
    if(!num||num.length<8)return toast('Enter valid number');
    if(b.dataset.step==='verify'){
      if($('wO').value.trim()==='123456')enterApp(num);else toast('Invalid OTP — try 123456');return;
    }
    b.textContent='Sending...';b.disabled=true;
    setTimeout(()=>{b.textContent='Verify OTP';b.disabled=false;b.dataset.step='verify';$('otpBox').style.display='block';toast('OTP: 123456 (demo)')},1500);
  };

  /* Social */
  $('gBtn').onclick=()=>{toast('Connecting Google...');setTimeout(()=>enterApp('GoogleUser'),1000)};
  $('hBtn').onclick=()=>{toast('Connecting GitHub...');setTimeout(()=>enterApp('GitHubUser'),1000)};
  if($('tBtn'))$('tBtn').onclick=()=>{toast('Connecting Twitter...');setTimeout(()=>enterApp('TwitterUser'),1000)};

  /* Sidebar */
  $('stgBtn').onclick=()=>$('sb').classList.toggle('col');

  /* Modes */
  $$('.mp').forEach(b=>{b.onclick=()=>{
    $$('.mp').forEach(x=>x.classList.remove('act'));b.classList.add('act');
    if(b.dataset.mode){activeMode=b.dataset.mode;toast('Mode: '+activeMode.toUpperCase())}
  }});

  /* New Chat */
  const newChat=()=>{$('msc').innerHTML='';toast('New session')};
  $('newChatBtn').onclick=newChat;$('ncb').onclick=newChat;

  /* Chat */
  $('mi').oninput=()=>{$('mi').style.height='auto';$('mi').style.height=Math.min($('mi').scrollHeight,200)+'px'};
  $('mi').onkeydown=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}};
  $('sdB').onclick=sendMsg;

  async function sendMsg(){
    const text=$('mi').value.trim();if(!text||typing)return;
    typing=true;
    /* User bubble */
    const msc=$('msc');
    const uM=document.createElement('div');uM.className='msg usr';
    uM.innerHTML='<div class="mbb">'+escH(text)+'</div><div class="mav">'+$('unD').textContent.charAt(0).toUpperCase()+'</div>';
    msc.appendChild(uM);
    $('mi').value='';$('mi').style.height='auto';
    $('ca').scrollTop=$('ca').scrollHeight;

    /* Show loader */
    $('lw').classList.add('on');
    $('ca').scrollTop=$('ca').scrollHeight;

    /* Call real backend */
    const data = await apiChat(text);

    /* Hide loader */
    $('lw').classList.remove('on');
    typing=false;

    /* AI bubble */
    const aM=document.createElement('div');aM.className='msg ai';
    const src=data.sourcedFromDB?'Database Verified':'AI Advisor';
    const modeName=activeMode==='ai'?'Brain':(activeMode==='project'?'Project':'Material');
    let html='<div class="mav">A</div><div class="mbb"><div class="db-header"><i class="fas fa-'+(data.sourcedFromDB?'database':'brain')+'"></i> Anubis '+modeName+' — '+src+'</div>';
    html+=window.marked?marked.parse(data.text||'No response'):(data.text||'No response');
    if(data.metrics){
      html+='<div style="margin-top:14px;font-size:10px;color:var(--t3);display:flex;gap:16px;flex-wrap:wrap">';
      html+='<span><i class="fas fa-microchip"></i> '+(data.metrics.model||'unknown')+'</span>';
      html+='<span><i class="fas fa-bolt"></i> '+(data.metrics.tokens||0)+' tokens</span>';
      html+='<span><i class="fas fa-gauge-high"></i> '+(data.metrics.tps||0).toFixed(1)+' t/s</span>';
      html+='</div>';
    }
    html+='</div>';
    aM.innerHTML=html;
    if(window.hljs)aM.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
    msc.appendChild(aM);
    $('ca').scrollTop=$('ca').scrollHeight;
  }
}

window.onload=init;
</script>
</body>
</html>
